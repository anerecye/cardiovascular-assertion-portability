<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="40" y="42" font-family="Arial" font-size="26" font-weight="700">SADS/Postmortem CAB Portability Context Map</text>
<text x="40" y="70" font-family="Arial" font-size="14">Portability audit, not cause-of-death inference or risk prediction.</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs>
<rect x="50" y="120" width="430" height="560" rx="18" fill="#fafafa" stroke="#111"/>
<text x="70" y="155" font-family="Arial" font-size="18" font-weight="700">A. Context transfer</text>
<rect x="85" y="200" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="105" y="235" font-family="Arial" font-size="13">Inherited-arrhythmia P/LP assertion</text>
<line x1="260" y1="258" x2="260" y2="288" stroke="#111" marker-end="url(#arrow)"/>
<rect x="85" y="300" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="105" y="335" font-family="Arial" font-size="13">Postmortem causal interpretation</text>
<line x1="260" y1="358" x2="260" y2="388" stroke="#111" marker-end="url(#arrow)"/>
<rect x="85" y="400" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="105" y="435" font-family="Arial" font-size="13">Family-risk interpretation</text>
<line x1="260" y1="458" x2="260" y2="488" stroke="#111" marker-end="url(#arrow)"/>
<rect x="85" y="500" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="105" y="535" font-family="Arial" font-size="13">Genotype-first phenotype-negative relative</text>
<rect x="530" y="120" width="430" height="560" rx="18" fill="#fafafa" stroke="#111"/>
<text x="550" y="155" font-family="Arial" font-size="18" font-weight="700">B. CAB routing</text>
<rect x="565" y="200" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="585" y="225" font-family="Arial" font-size="13" font-weight="700">direct self-loop</text>
<text x="585" y="243" font-family="Arial" font-size="11">only concordant phenotype loop</text>
<rect x="565" y="282" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="585" y="307" font-family="Arial" font-size="13" font-weight="700">trigger-context review</text>
<text x="585" y="325" font-family="Arial" font-size="11">Brugada/SADS-like contexts</text>
<rect x="565" y="364" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="585" y="389" font-family="Arial" font-size="13" font-weight="700">disease-specific review</text>
<text x="585" y="407" font-family="Arial" font-size="11">channelopathy/VCEP-style review</text>
<rect x="565" y="446" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="585" y="471" font-family="Arial" font-size="13" font-weight="700">PRF-needed</text>
<text x="585" y="489" font-family="Arial" font-size="11">family-risk / phenotype-negative</text>
<rect x="565" y="528" width="350" height="58" rx="12" fill="#fff" stroke="#111"/>
<text x="585" y="553" font-family="Arial" font-size="13" font-weight="700">no deterministic reuse</text>
<text x="585" y="571" font-family="Arial" font-size="11">unsupported transfer</text>
<rect x="1010" y="120" width="430" height="560" rx="18" fill="#fafafa" stroke="#111"/>
<text x="1030" y="155" font-family="Arial" font-size="18" font-weight="700">C. Forbidden overclaim boundary</text>
<rect x="1045" y="200" width="350" height="62" rx="12" fill="#fff" stroke="#111"/>
<text x="1065" y="237" font-family="Arial" font-size="12">variant classification ≠ cause of death</text>
<rect x="1045" y="282" width="350" height="62" rx="12" fill="#fff" stroke="#111"/>
<text x="1065" y="319" font-family="Arial" font-size="12">cause-of-death relevance ≠ individual family risk</text>
<rect x="1045" y="364" width="350" height="62" rx="12" fill="#fff" stroke="#111"/>
<text x="1065" y="401" font-family="Arial" font-size="12">P/LP assertion ≠ deterministic disease in phenotype-negative relative</text>
<rect x="1045" y="446" width="350" height="62" rx="12" fill="#fff" stroke="#111"/>
<text x="1065" y="483" font-family="Arial" font-size="12">CAB audit ≠ clinical validation</text>
<rect x="1045" y="528" width="350" height="62" rx="12" fill="#fff" stroke="#111"/>
<text x="1065" y="565" font-family="Arial" font-size="12">CAB complement ≠ VCEP replacement</text>
<text x="40" y="805" font-family="Arial" font-size="12">SADS is treated as a portability stress-test for assertion meaning, not as a validated outcome domain.</text>
</svg>